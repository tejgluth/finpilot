name: CI

on:
  push:
  pull_request:

jobs:
  # ── Backend: lint + tests ────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync Python dependencies
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check backend
      - name: Pytest
        run: uv run pytest backend/tests

  # ── Frontend: typecheck + build ──────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install frontend dependencies
        run: pnpm --dir frontend install
      - name: Typecheck
        run: pnpm --dir frontend typecheck
      - name: Build
        run: pnpm --dir frontend build

  # ── Dependency security audit ────────────────────────────────────────────────
  dep-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync Python dependencies
        run: uv sync
      - name: Python dependency audit
        run: uvx pip-audit
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install frontend dependencies
        run: pnpm --dir frontend install
      - name: Frontend dependency audit
        # --audit-level=critical blocks only on critical vulnerabilities.
        # Advisory-level findings are common in JS ecosystems and are printed
        # but do not fail the build.
        run: pnpm --dir frontend audit --audit-level=critical
        continue-on-error: false

  # ── Smoke test: does the backend boot? ──────────────────────────────────────
  smoke:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync Python dependencies
        run: uv sync
      - name: Create required data directories
        run: mkdir -p data/cache data/artifacts
      - name: Smoke test
        run: bash scripts/smoke_test.sh

  # ── E2E: first-run Playwright flow ──────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync Python dependencies
        run: uv sync
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install frontend dependencies
        run: pnpm --dir frontend install
      - name: Install Playwright browsers
        run: pnpm --dir frontend exec playwright install chromium --with-deps
      - name: Create required data directories
        run: mkdir -p data/cache data/artifacts
      - name: Start backend
        run: |
          uv run python -m backend.main &
          # Wait up to 20s for the backend health endpoint to respond.
          for i in $(seq 1 20); do
            if curl -s http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
            if [ "$i" -eq 20 ]; then
              echo "Backend did not start within 20s"
              exit 1
            fi
          done
      - name: Run E2E tests
        # CI=true causes playwright.config.ts to start the Vite dev server
        # automatically and not reuse any existing server.
        run: pnpm --dir frontend e2e
        env:
          CI: "true"
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Upload test failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 7
